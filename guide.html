<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 사내 차량 길안내 시스템</title>

<style>
:root {
    --primary-color: #00acc1;
    --secondary-color: #c2185b;
    --bg-color: #f8f9fa;
    --card-bg: #ffffff;
    --text-color: #333333;
}

body {
    margin: 0;
    font-family: 'Malgun Gothic', -apple-system, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    text-align: center;
    padding-bottom: 30px;
}

.header {
    background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
    color: white;
    padding: 20px 15px;
    font-weight: bold;
    font-size: 1.4rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    letter-spacing: -0.5px;
}

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 15px;
    box-sizing: border-box;
}

/* 공장 선택 메뉴 */
.factory-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
}

.factory-btn {
    background: var(--card-bg);
    border: 1.5px solid #e0e0e0;
    color: #444;
    padding: 18px 10px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.factory-btn span {
    font-size: 1.5rem;
}

.factory-btn.active {
    border-color: var(--primary-color);
    background: #e0f7fa;
    color: var(--primary-color);
    box-shadow: 0 4px 12px rgba(0, 172, 193, 0.15);
    transform: translateY(-2px);
}

/* 🛑 [초기 노출] 안전 수칙 및 속도 제한 배너 */
.info-banner {
    background: #fff9db;
    border-left: 5px solid #fab005;
    padding: 15px;
    border-radius: 8px;
    text-align: left;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.info-banner h3 {
    margin: 0 0 8px 0;
    color: #f59f00;
    font-size: 1.05rem;
}

.info-banner p {
    margin: 5px 0;
    font-size: 0.9rem;
    line-height: 1.4;
    color: #555;
}

.info-banner a {
    color: #0076a3;
    text-decoration: none;
    font-weight: bold;
}

/* 속도 강조 스타일 */
.speed-badge {
    background-color: #ffec99;
    color: #d9480f;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: bold;
}

/* 📸 갈림길 실시간 안내 카드 (지도 위로 상향 배치) */
.guide-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    border: 1px solid #e8e8e8;
    text-align: left;
    display: none;
    margin-bottom: 20px;
}

.guide-card h4 {
    margin: 0 0 12px 0;
    color: var(--secondary-color);
    font-size: 1.1rem;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 8px;
}

.guide-img-box {
    width: 100%;
    height: 200px;
    background: #e9ecef;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.guide-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.guide-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #444;
    background: #f1f3f5;
    padding: 12px;
    border-radius: 8px;
    margin: 0 0 15px 0;
}

/* 📞 비상 전화 바로걸기 버튼 스타일 */
.call-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #e6fcf5;
    border: 1.5px dashed #0ca678;
    color: #0ca678;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    text-decoration: none;
    font-size: 0.95rem;
    transition: background 0.2s;
}

.call-btn:active {
    background: #c3fae8;
}

/* 🗺️ 구글 마이맵 레이아웃 (최하단으로 하향 조정) */
.map-wrapper {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 10px;
    border: 1px solid #e0e0e0;
    display: none;
    position: relative;
}

.map-wrapper iframe {
    width: 100%;
    height: 420px;
    border: none;
}

/* 🎯 내 위치 갱신/재조정 버튼 */
.gps-refresh-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: #ffffff;
    color: #333333;
    border: 2px solid #00acc1;
    padding: 10px 16px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 0.9rem;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
    transition: all 0.2s;
}

.gps-refresh-btn:active {
    background: #e0f7fa;
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="header">🏭 공장 내부 차량 길안내 시스템</div>

<div class="container">
    
    <p style="text-align:left; font-weight:bold; margin-bottom:10px; color:#666;">📍 목적지 공장을 골라주세요</p>
    <div class="factory-grid">
        <button class="factory-btn" onclick="selectFactory('PO')"><span>📦</span>PO 공장</button>
        <button class="factory-btn" onclick="selectFactory('EVA')"><span>🧪</span>EVA 공장</button>
        <button class="factory-btn" onclick="selectFactory('HPM')"><span>🏗️</span>HPM 공장</button>
        <button class="factory-btn" onclick="selectFactory('PVC')"><span>🪟</span>PVC 공장</button>
        <button class="factory-btn" onclick="selectFactory('BPA')"><span>⚗️</span>BPA 공장</button>
        <button class="factory-btn" onclick="selectFactory('POE')"><span>🛡️</span>POE 공장</button>
    </div>

    <div class="info-banner">
        <h3>⚠️ 단지 내 운행 안전 수칙</h3>
        <p id="speedNotice">• 현재 구간 규정 속도: <span id="currentSpeedLimit" class="speed-badge">시속 35km 이하</span> 서행 준수</p>
        <p style="font-weight: bold; color: #cc5de8;">• [중요] 마이맵상의 직선 경로가 아닌, 실제 아스팔트 사내 도로 선형을 따라 운행하세요.</p>
        <p>• 하차 공간 진입 전 비상등 점등 및 단지 내 지게차 절대 주의</p>
        <p>• 문의 사항 발생 시 아래 안내 카드의 전화 버튼을 터치하세요.</p>
    </div>

    <div id="guideCard" class="guide-card">
        <h4 id="guideTitle">📌 주요 갈림길 운행 가이드</h4>
        <div class="guide-img-box">
            <img id="guideImg" src="" alt="갈림길 안내">
        </div>
        <p id="guideText" class="guide-text">목적지를 선택하면 상세 교차로 가이드가 표시됩니다.</p>
        
        <a id="callManager" href="tel:010-1234-5678" class="call-btn">
            📞 물류 담당자에게 즉시 전화 걸기 (문의)
        </a>
    </div>

    <div id="mapWrapper" class="map-wrapper">
        <button class="gps-refresh-btn" onclick="retrackLocation()">🔄 내 위치 재조정</button>
        <iframe id="mapFrame" src="" allow="geolocation; accelerometer; gyroscope"></iframe>
    </div>

</div>

<script>
let currentStageIndex = 0;
let routeStages = [];
let watchId = null; 

// 실제 대산공장 내 아스팔트 주행 도로 곡선 궤적 및 라벨 명칭 정밀 맵핑 데이터
const factoryData = {
    'PO': {
        mapUrl: "https://www.google.com/maps/d/embed?mid=1DwJpTuOQad3IWc_xpq3r8yuSvPrmj7E&wp=1",
        stages: [
            {
                name: "서문 (출발지점)",
                lat: 36.9925492, lon: 126.3695483, radius: 60,
                speedLimit: "35km", 
                nextTitle: "👉 1단계: 방재실 사거리 방면 이동",
                nextText: "서문(정문 보안실)을 통과하셨습니다. 실제 도로를 따라 전방에 보이는 **방재실 사거리** 구간으로 곧장 진입해 주세요. (단지 내 기본 규정 속도 시속 35km 준수)",
                nextImg: "room.png" 
            },
            {
                name: "방재실 앞 사거리",
                lat: 36.9944902, lon: 126.3745901, radius: 55,
                speedLimit: "35km",
                nextTitle: "👉 2단계: 미래기술관 교차로 방면 직진",
                nextText: "방재실 앞 교차로를 안전하게 통과했습니다. 정면 도로 측면에서 합류하는 사내 지게차 및 특수 차량에 유의하시며 **미래기술관** 정면 방향으로 계속 직진하세요.",
                nextImg: "future.png" 
            },
            {
                name: "미래기술관 (서행 구간 진입)",
                lat: 36.9967810, lon: 126.3799103, radius: 45, 
                speedLimit: "20km", 
                nextTitle: "🛑 3단계: 전방 갈림길에서 [우회전] 하세요",
                nextText: "미래기술관 건물 구역을 통과하자마자 코너 갈림길이 나타납니다. **지금부터 규정 속도를 시속 20km로 대폭 낮추시고**, 안전을 확인한 뒤 우회전하세요.",
                nextImg: "turn_right.png" 
            },
            {
                name: "우회전 코너 구간",
                lat: 36.9984565, lon: 126.3791392, radius: 45,
                speedLimit: "20km",
                nextTitle: "🛑 4단계: 출하 창고 진입 전 [좌회전] 준비",
                nextText: "우회전 코너를 돌아 노면을 따라 진입했습니다. 속도 20km 미만을 상시 유지해 주시고, 전방 정면 구조물 안쪽 진입로를 향해 크게 **좌회전** 할 준비를 하세요.",
                nextImg: "turn_left.png" 
            },
            {
                name: "좌회전 및 하차장 입구",
                lat: 36.9989486, lon: 126.3841774, radius: 50,
                speedLimit: "20km",
                nextTitle: "🏁 최종 단계: PO 출하 창고 하차장 도착",
                nextText: "안내에 따라 좌회전 진입을 완료했습니다. 눈앞에 보이는 **PO 출하 창고 하차 공간** 내부로 안전 요원의 수신호에 따라 서행하며 차량을 도킹해 주세요.",
                nextImg: "arrival.png" 
            }
        ]
    }
};

// 두 좌표 간의 정확한 구면 거리를 계산하는 하버사인 수식
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}

// 공장 선택 인터페이스 조작 엔진
function selectFactory(code) {
    const buttons = document.querySelectorAll('.factory-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    
    if(event && event.currentTarget) {
        event.currentTarget.classList.add('active');
    }

    const data = factoryData[code];
    
    if(data) {
        currentStageIndex = 0;
        routeStages = data.stages;

        // 1. 가이드 안내 카드 상단 노출 및 내용 동기화
        const firstGuide = routeStages[0];
        document.getElementById('guideTitle').innerText = "🏁 출발지 매칭 완료: " + firstGuide.name;
        document.getElementById('guideText').innerHTML = firstGuide.nextText;
        document.getElementById('guideImg').src = firstGuide.nextImg;
        document.getElementById('guideCard').style.display = 'block';
        
        document.getElementById('currentSpeedLimit').innerText = "시속 35km 이하";
        document.getElementById('currentSpeedLimit').style.color = "#d9480f";

        // 2. 구글 마이맵 최하단 배치 상태로 원활하게 호출
        const mapFrame = document.getElementById('mapFrame');
        mapFrame.src = data.mapUrl;
        document.getElementById('mapWrapper').style.display = 'block';

        // 3. 실시간 위치 추적 서비스 기동 및 화면 스크롤 포커싱
        startTracking();
        document.getElementById('guideCard').scrollIntoView({ behavior: 'smooth' });
    } else {
        alert(code + " 공장의 상세 경로 및 매칭 가이드가 시스템에 등록되지 않았습니다.");
    }
}

// 실제 기사의 GPS 이동 궤적을 실시간으로 감시하여 가이드 카드를 자동 전환하는 추적 엔진
function startTracking() {
    if (watchId) navigator.geolocation.clearWatch(watchId); 

    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(function(position) {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;

            if (routeStages.length === 0 || currentStageIndex >= routeStages.length) return;

            // 기사님이 현재 지나가고 있는 마이맵상의 실제 매칭 스폿 
            const currentTarget = routeStages[currentStageIndex];
            const distance = getDistance(userLat, userLon, currentTarget.lat, currentTarget.lon);

            // 지정된 실제 도로 오차 반경 안으로 차량이 진입했을 경우
            if (distance <= currentTarget.radius) {
                currentStageIndex++; 

                if (currentStageIndex < routeStages.length) {
                    const nextGuide = routeStages[currentStageIndex];
                    
                    // 다음 매칭 스폿의 이미지와 텍스트, 안전 속도로 자동 새로고침 처리
                    document.getElementById('guideTitle').innerText = nextGuide.nextTitle;
                    document.getElementById('guideText').innerHTML = nextGuide.nextText;
                    document.getElementById('guideImg').src = nextGuide.nextImg;
                    
                    if (nextGuide.speedLimit === "20km") {
                        document.getElementById('currentSpeedLimit').innerText = "시속 20km 이하 (절대 서행 구간)";
                        document.getElementById('currentSpeedLimit').style.color = "#c2185b"; 
                    } else {
                        document.getElementById('currentSpeedLimit').innerText = "시속 35km 이하";
                        document.getElementById('currentSpeedLimit').style.color = "#d9480f";
                    }
                    
                    document.getElementById('guideCard').scrollIntoView({ behavior: 'smooth' });
                } else {
                    // 최종 창고 도킹 완료 시 가이드 상태창 종료
                    document.getElementById('guideTitle').innerText = "🏁 PO 출하 창고 도킹 완료";
                    document.getElementById('guideText').innerHTML = "안전하게 최종 목적지 창고에 도착했습니다. 안내 시스템을 종료합니다. 수고하셨습니다!";
                    document.getElementById('currentSpeedLimit').innerText = "하차 작업 구역 도착";
                    document.getElementById('currentSpeedLimit').style.color = "#00acc1";
                }
            }
        }, function(error) {
            console.error("사내 GPS 위성 수신 지연 오류:", error);
        }, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 8000
        });
    }
}

// GPS 먹통 방지 강제 갱신 엔진
function retrackLocation() {
    const mapFrame = document.getElementById('mapFrame');
    const currentSrc = mapFrame.src;
    mapFrame.src = ''; 
    mapFrame.src = currentSrc; 

    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        setTimeout(function() {
            startTracking();
            alert("🗺️ 현재 위치 동기화 및 사내 GPS 신호를 정상 재조정했습니다.");
        }, 300);
    } else {
        alert("목적지 공장을 먼저 선택하셔야 실시간 GPS 조율이 가동됩니다.");
    }
}
</script>

</body>
</html>
