<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통합 사내 차량 길안내 시스템</title>

<style>
:root {
    --primary-color: #00acc1;
    --secondary-color: #c2185b;
    --bg-color: #f8f9fa;
    --card-bg: #ffffff;
    --text-color: #333333;
}

body {
    margin: 0;
    font-family: 'Malgun Gothic', -apple-system, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    text-align: center;
    padding-bottom: 40px;
}

.header {
    background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
    color: white;
    padding: 18px 15px;
    font-weight: bold;
    font-size: 1.3rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 15px;
    box-sizing: border-box;
}

.factory-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
}

.factory-btn {
    background: var(--card-bg);
    border: 1.5px solid #e0e0e0;
    color: #444;
    padding: 15px 10px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.factory-btn.active {
    border-color: var(--primary-color);
    background: #e0f7fa;
    color: var(--primary-color);
    box-shadow: 0 4px 10px rgba(0, 172, 193, 0.15);
}

.status-dashboard {
    background: #212529;
    color: #00ff66;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    text-align: left;
    margin-bottom: 15px;
    font-family: monospace;
    display: none;
    line-height: 1.4;
}

.info-banner {
    background: #fff9db;
    border-left: 5px solid #fab005;
    padding: 12px;
    border-radius: 8px;
    text-align: left;
    margin-bottom: 15px;
    font-size: 0.85rem;
}

.info-banner h3 { margin: 0 0 6px 0; color: #f59f00; font-size: 0.95rem; }
.info-banner p { margin: 4px 0; color: #555; }

.map-container {
    position: relative;
    width: 100%;
    height: 400px;
    background: #e9ecef;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 15px;
    border: 1px solid #e0e0e0;
    display: none;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.guide-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    border: 1px solid #e8e8e8;
    text-align: left;
    display: none;
}

.guide-card h4 {
    margin: 0 0 10px 0;
    color: var(--secondary-color);
    font-size: 1.05rem;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 6px;
}

.guide-img-box {
    width: 100%;
    height: 180px;
    background: #e9ecef;
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
}

.guide-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.guide-text {
    font-size: 0.9rem;
    line-height: 1.45;
    color: #444;
    background: #f1f3f5;
    padding: 10px;
    border-radius: 8px;
}

.external-map-btn {
    display: block;
    background: #4285F4;
    color: white;
    text-decoration: none;
    padding: 12px;
    border-radius: 10px;
    margin-top: 15px;
    font-weight: bold;
    font-size: 0.95rem;
    text-align: center;
    box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
}
</style>
</head>

<body>

<div class="header">🏭 공장 내부 차량 길안내 시스템</div>

<div class="container">
    
    <p style="text-align:left; font-weight:bold; margin-bottom:10px; color:#666; font-size:0.9rem;">📍 목적지 공장을 골라주세요</p>
    <div class="factory-grid">
        <button class="factory-btn" onclick="selectFactory('PO')"><span>📦</span>PO 공장</button>
        <button class="factory-btn" onclick="selectFactory('EVA')"><span>🧪</span>EVA 공장</button>
        <button class="factory-btn" onclick="selectFactory('HPM')"><span>🏗️</span>HPM 공장</button>
        <button class="factory-btn" onclick="selectFactory('PVC')"><span>🪟</span>PVC 공장</button>
        <button class="factory-btn" onclick="selectFactory('BPA')"><span>⚗️</span>BPA 공장</button>
        <button class="factory-btn" onclick="selectFactory('POE')"><span>🛡️</span>POE 공장</button>
    </div>

    <div id="statusDashboard" class="status-dashboard">📡 시스템 레이더 가동 대기 중...</div>

    <div class="info-banner">
        <h3>⚠️ 단지 내 운행 안전 수칙</h3>
        <p>• 현재 구간 규정 속도: <span id="currentSpeedLimit" style="background:#ffec99; color:#d9480f; padding:2px 5px; border-radius:4px; font-weight:bold;">시속 35km 이하</span> 준수</p>
        <p>• 하차 공간 진입 전 비상등 점등 및 단지 내 지게차 절대 주의</p>
    </div>

    <div id="mapContainer" class="map-container">
        <iframe id="mapFrame" src="" allow="geolocation *;"></iframe>
    </div>

    <div id="guideCard" class="guide-card">
        <h4 id="guideTitle">📌 주요 갈림길 운행 가이드</h4>
        <div class="guide-img-box">
            <img id="guideImg" src="" alt="갈림길 안내">
        </div>
        <p id="guideText" class="guide-text">목적지를 선택하면 상세 교차로 가이드가 표시됩니다.</p>
        
        <a id="externalMapLink" class="external-map-btn" href="#" target="_blank">🗺️ 원본 구글 지도 앱으로 열기</a>
    </div>

</div>

<script>
let currentStageIndex = 0;
let routeStages = [];
let watchId = null;

const factoryData = {
    'PO': {
        // 💡 [수정 완료] 404 에러를 내던 가짜 도메인을 제거하고, 진짜 구글 마이맵 임베드 보안 주소(https) 및 파란 점 복원 옵션(&wp=1)을 정확히 결합했습니다.
        mapUrl: "https://www.google.com/maps/d/embed?mid=1DwJpTuOQad3IWc_xpq3r8yuSvPrmj7E&ehbc=2E312F&wp=1",
        appUrl: "https://www.google.com/maps/d/viewer?mid=1DwJpTuOQad3IWc_xpq3r8yuSvPrmj7E",
        stages: [
            {
                name: "서문 (출발)",
                lat: 36.9925492, lon: 126.3695483, radius: 150,
                speedLimit: "35km", 
                nextTitle: "👉 1단계: 방재실 사거리 방면 이동",
                nextText: "서문을 통과하셨습니다. 앞쪽에 보이는 방재실 사거리 구간으로 진입해 주세요. (단지 내 시속 35km 준수)",
                nextImg: "room.png" 
            },
            {
                name: "방재실",
                lat: 36.9944902, lon: 126.3745901, radius: 150,
                speedLimit: "35km",
                nextTitle: "👉 2단계: 미래기술관 교차로 방면 직진",
                nextText: "방재실 사거리를 통과했습니다. 전방 교차로 및 합류 차량에 유의하시며 미래기술관 앞쪽으로 계속 직진하세요.",
                nextImg: "future.png" 
            },
            {
                name: "미래기술관",
                lat: 36.9967810, lon: 126.3799103, radius: 150, 
                speedLimit: "20km", 
                nextTitle: "🛑 3단계: 앞 교차로에서 [우회전] 하세요",
                nextText: "미래기술관 구역을 통과하자마자 나오는 갈림길입니다. **지금부터 시속 20km로 서행**하며 즉시 우회전하세요.",
                nextImg: "turn_right.png" 
            },
            {
                name: "우회전 지점",
                lat: 36.9984565, lon: 126.3791392, radius: 150,
                speedLimit: "20km",
                nextTitle: "🛑 4단계: 창고 진입 전 [좌회전] 준비",
                nextText: "우회전 구간을 통과했습니다. 시속 20km 속도를 유지하시고, 정면 구조물을 끼고 안쪽 진입로를 향해 **좌회전** 하세요.",
                nextImg: "turn_left.png" 
            },
            {
                name: "좌회전 지점",
                lat: 36.9989486, lon: 126.3841774, radius: 150,
                speedLimit: "20km",
                nextTitle: "🏁 최종 단계: PO 출하 창고 도착",
                nextText: "좌회전 진입 완료했습니다. 전방에 보이는 PO 출하 창고 하차 공간으로 시속 20km 이하로 안전하게 진입해 주세요.",
                nextImg: "arrival.png" 
            }
        ]
    }
};

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function selectFactory(code) {
    const buttons = document.querySelectorAll('.factory-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    if(event && event.currentTarget) event.currentTarget.classList.add('active');

    const data = factoryData[code];
    if(data) {
        routeStages = data.stages;

        document.getElementById('mapFrame').src = data.mapUrl;
        document.getElementById('externalMapLink').href = data.appUrl;
        document.getElementById('mapContainer').style.display = 'block';
        document.getElementById('statusDashboard').style.display = 'block';

        // 💡 [최종 치트키] 앱이 켜지자마자 현재 기사님의 폰 GPS 위치와 가장 가까운 거점을 찾아 순간이동시킵니다.
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let minDistance = Infinity;
                let closestIndex = 0;
                
                routeStages.forEach((stage, index) => {
                    let d = getDistance(uLat, uLon, stage.lat, stage.lon);
                    if (d < minDistance) {
                        minDistance = d;
                        closestIndex = index;
                    }
                });
                
                // 가장 가까운 구간 인덱스로 강제 매칭 후 UI 초기 가동
                currentStageIndex = closestIndex;
                renderCurrentStage();
                activateTracking();
            }, function() {
                // GPS 오류 시 기본 0번부터 시작
                currentStageIndex = 0;
                renderCurrentStage();
                activateTracking();
            }, { enableHighAccuracy: true });
        }
    }
}

function renderCurrentStage() {
    if (routeStages.length === 0) return;
    const stage = routeStages[currentStageIndex];
    
    document.getElementById('guideTitle').innerText = (currentStageIndex === 0) ? "🏁 출발 안내: " + stage.name : stage.nextTitle;
    document.getElementById('guideText').innerHTML = stage.nextText;
    document.getElementById('guideImg').src = stage.nextImg;
    document.getElementById('guideCard').style.display = 'block';
    
    const limitBadge = document.getElementById('currentSpeedLimit');
    if (stage.speedLimit === "20km") {
        limitBadge.innerText = "시속 20km 이하 (절대 서행)";
        limitBadge.style.backgroundColor = "#ffc9c9";
        limitBadge.style.color = "#c2185b";
    } else {
        limitBadge.innerText = "시속 35km 이하";
        limitBadge.style.backgroundColor = "#ffec99";
        limitBadge.style.color = "#d9480f";
    }
}

function activateTracking() {
    if (watchId) navigator.geolocation.clearWatch(watchId);

    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(function(position) {
            const uLat = position.coords.latitude;
            const uLon = position.coords.longitude;

            if (routeStages.length === 0 || currentStageIndex >= routeStages.length) return;

            const target = routeStages[currentStageIndex];
            const dist = getDistance(uLat, uLon, target.lat, target.lon);

            document.getElementById('statusDashboard').innerHTML = 
                `📡 내비게이션 트래킹 엔진 가동 중<br>` +
                `📍 현재 좌표: ${uLat.toFixed(6)}, ${uLon.toFixed(6)}<br>` +
                `🎯 타겟 거점 [${target.name}]까지 남은 거리: ${dist.toFixed(0)}m`;

            if (dist <= target.radius) {
                currentStageIndex++;
                if (currentStageIndex < routeStages.length) {
                    renderCurrentStage();
                } else {
                    document.getElementById('guideTitle').innerText = "🏁 PO 출하 창고 도착 완료";
                    document.getElementById('guideText').innerHTML = "안전하게 목적지에 도달했습니다. 운행을 종료합니다.";
                }
            }
        }, function(error) {
            console.error(error);
        }, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });
    }
}
</script>

</body>
</html>
