<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통합 사내 차량 길안내 시스템</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
    --primary-color: #00acc1;
    --secondary-color: #c2185b;
    --bg-color: #f8f9fa;
    --card-bg: #ffffff;
    --text-color: #333333;
}

body {
    margin: 0;
    font-family: 'Malgun Gothic', -apple-system, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    text-align: center;
    padding-bottom: 40px;
}

.header {
    background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
    color: white;
    padding: 18px 15px;
    font-weight: bold;
    font-size: 1.3rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 15px;
    box-sizing: border-box;
}

.factory-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 15px;
}

.factory-btn {
    background: var(--card-bg);
    border: 1.5px solid #e0e0e0;
    color: #444;
    padding: 12px 5px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
}

.factory-btn.active {
    border-color: var(--primary-color);
    background: #e0f7fa;
    color: var(--primary-color);
    box-shadow: 0 4px 10px rgba(0, 172, 193, 0.15);
}

.status-dashboard {
    background: #212529;
    color: #00ff66;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    text-align: left;
    margin-bottom: 15px;
    font-family: monospace;
    display: none;
    line-height: 1.4;
}

/* 🗺️ 유경님 페이지 내부에 박히는 지도 스크린 */
.map-container {
    width: 100%;
    height: 380px;
    background: #e9ecef;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 15px;
    border: 1px solid #e0e0e0;
    display: none;
}

#map {
    width: 100%;
    height: 100%;
}

/* 🔵 실시간 파란 점 커스텀 디자인 스타일 */
.custom-blue-dot {
    width: 14px !important;
    height: 14px !important;
    background: #007bff;
    border: 2px solid #ffffff;
    border-radius: 50%;
    box-shadow: 0 0 8px #007bff, 0 0 15px #007bff;
}

.guide-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    border: 1px solid #e8e8e8;
    text-align: left;
    display: none;
}

.guide-card h4 {
    margin: 0 0 10px 0;
    color: var(--secondary-color);
    font-size: 1.05rem;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 6px;
}

.guide-img-box {
    width: 100%;
    height: 180px;
    background: #e9ecef;
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
}

.guide-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.guide-text {
    font-size: 0.9rem;
    line-height: 1.45;
    color: #444;
    background: #f1f3f5;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">🏭 대산공장 통합 차량 안내 시스템</div>

<div class="container">
    
    <div class="factory-grid">
        <button class="factory-btn" onclick="selectFactory('PO')">PO 공장</button>
        <button class="factory-btn" onclick="selectFactory('EVA')">EVA 공장</button>
        <button class="factory-btn" onclick="selectFactory('HPM')">HPM 공장</button>
        <button class="factory-btn" onclick="selectFactory('PVC')">PVC 공장</button>
        <button class="factory-btn" onclick="selectFactory('BPA')">BPA 공장</button>
        <button class="factory-btn" onclick="selectFactory('POE')">POE 공장</button>
    </div>

    <div id="statusDashboard" class="status-dashboard">📡 시스템 동기화 가동 준비 중...</div>

    <div id="mapContainer" class="map-container">
        <div id="map"></div>
    </div>

    <div id="guideCard" class="guide-card">
        <h4 id="guideTitle">📌 주요 갈림길 운행 가이드</h4>
        <div class="guide-img-box">
            <img id="guideImg" src="" alt="갈림길 안내">
        </div>
        <p id="guideText" class="guide-text">목적지를 선택하면 상세 교차로 가이드가 표시됩니다.</p>
    </div>

</div>

<script>
let map = null;
let userMarker = null; // 🔵 진짜 실시간으로 지도 위를 굴러다닐 파란 점 마커
let routePolyline = null; // 🛣️ [서문 -> 창고] 빨간색 가이드선
let currentStageIndex = 0;
let routeStages = [];
let watchId = null;

const factoryData = {
    'PO': {
        stages: [
            { name: "서문 (출발)", lat: 36.9925492, lon: 126.3695483, radius: 150, speedLimit: "35km", nextTitle: "👉 1단계: 방재실 사거리 방면 이동", nextText: "서문을 통과하셨습니다. 앞쪽에 보이는 방재실 사거리 구간으로 진입해 주세요.", nextImg: "room.png" },
            { name: "방재실", lat: 36.9944902, lon: 126.3745901, radius: 150, speedLimit: "35km", nextTitle: "👉 2단계: 미래기술관 교차로 방면 직진", nextText: "방재실 사거리를 통과했습니다. 미래기술관 앞쪽으로 계속 직진하세요.", nextImg: "future.png" },
            { name: "미래기술관", lat: 36.9967810, lon: 126.3799103, radius: 150, speedLimit: "20km", nextTitle: "🛑 3단계: 앞 교차로에서 [우회전] 하세요", nextText: "미래기술관 구역을 통과하자마자 나오는 갈림길입니다. 즉시 우회전하세요.", nextImg: "turn_right.png" },
            { name: "우회전 지점", lat: 36.9984565, lon: 126.3791392, radius: 150, speedLimit: "20km", nextTitle: "🛑 4단계: 창고 진입 전 [좌회전] 준비", nextText: "우회전 구간을 통과했습니다. 안쪽 진입로를 향해 좌회전 하세요.", nextImg: "turn_left.png" },
            { name: "좌회전 지점", lat: 36.9989486, lon: 126.3841774, radius: 150, speedLimit: "20km", nextTitle: "🏁 최종 단계: PO 출하 창고 도착", nextText: "전방에 보이는 PO 출하 창고 하차 공간으로 안전하게 진입해 주세요.", nextImg: "arrival.png" }
        ]
    }
};

// 키 없이 작동하는 오픈 지도 초기화
function initMapEngine() {
    if (map) return;
    
    // 대산공장 한가운데를 기본 줌으로 세팅
    map = L.map('map').setView([36.9955, 126.3770], 15);

    // 💡 구글 지도와 똑같이 생긴 실시간 위성/일반 융합(하이브리드) 맵 레이어를 다이렉트로 매칭
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 19,
        attribution: 'Google Maps'
    }).addTo(map);
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function selectFactory(code) {
    const buttons = document.querySelectorAll('.factory-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    if(event && event.currentTarget) event.currentTarget.classList.add('active');

    const data = factoryData[code];
    if(!data) return;

    routeStages = data.stages;
    currentStageIndex = 0;

    document.getElementById('mapContainer').style.display = 'block';
    document.getElementById('statusDashboard').style.display = 'block';
    
    // 엔진 켜기
    initMapEngine();

    // 맵 크기 재조정 및 가이드 경로선 즉시 그리기
    setTimeout(() => {
        map.invalidateSize();
        map.setView([routeStages[0].lat, routeStages[0].lon], 16);
        drawRouteLine();
    }, 100);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const uLat = position.coords.latitude;
            const uLon = position.coords.longitude;
            
            let minDistance = Infinity;
            let closestIndex = 0;
            
            routeStages.forEach((stage, index) => {
                let d = getDistance(uLat, uLon, stage.lat, stage.lon);
                if (d < minDistance) { minDistance = d; closestIndex = index; }
            });
            
            currentStageIndex = closestIndex;
            renderCurrentStage();
            startLiveTracking();
        }, function() {
            currentStageIndex = 0;
            renderCurrentStage();
            startLiveTracking();
        }, { enableHighAccuracy: true });
    }
}

// 🛣️ 지도판 위에 가야 할 선(경로선) 빨갛게 그려주는 기능
function drawRouteLine() {
    if (routePolyline) map.removeLayer(routePolyline);

    const pathCoordinates = routeStages.map(stage => [stage.lat, stage.lon]);

    routePolyline = L.polyline(pathCoordinates, {
        color: '#ff0055', // 선명한 핫핑크 레전드 경로선
        weight: 6,
        opacity: 0.85
    }).addTo(map);
}

function renderCurrentStage() {
    if (routeStages.length === 0) return;
    const stage = routeStages[currentStageIndex];
    
    document.getElementById('guideTitle').innerText = (currentStageIndex === 0) ? "🏁 출발 안내: " + stage.name : stage.nextTitle;
    document.getElementById('guideText').innerHTML = stage.nextText;
    document.getElementById('guideImg').src = stage.nextImg;
    document.getElementById('guideCard').style.display = 'block';
}

function startLiveTracking() {
    if (watchId) navigator.geolocation.clearWatch(watchId);

    const blueDotIcon = L.divIcon({
        className: 'custom-blue-dot',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
    });

    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(function(position) {
            const uLat = position.coords.latitude;
            const uLon = position.coords.longitude;

            // 🔵 [유경님 요청 핵심] API 키 하나 없이 유경님 페이지 맵 위에 실시간 파란 점 찍고 움직이기 구현!
            if (!userMarker) {
                userMarker = L.marker([uLat, uLon], { icon: blueDotIcon }).addTo(map);
            } else {
                userMarker.setLatLng([uLat, uLon]); // 차 움직이면 파란 점도 실시간 대시무빙
            }

            if (routeStages.length === 0 || currentStageIndex >= routeStages.length) return;

            const target = routeStages[currentStageIndex];
            const dist = getDistance(uLat, uLon, target.lat, target.lon);

            document.getElementById('statusDashboard').innerHTML = 
                `📡 플러그인 독립형 내비게이션 트래킹 가동 중<br>` +
                `📍 현재 위치: ${uLat.toFixed(6)}, ${uLon.toFixed(6)}<br>` +
                `🎯 [${target.name}] 거점 매칭까지 남은 거리: ${dist.toFixed(0)}m`;

            if (dist <= target.radius) {
                currentStageIndex++;
                if (currentStageIndex < routeStages.length) {
                    renderCurrentStage();
                } else {
                    document.getElementById('guideTitle').innerText = "🏁 PO 출하 창고 도착 완료";
                    document.getElementById('guideText').innerHTML = "안전하게 목적지에 도달했습니다. 운행을 종료합니다.";
                }
            }
        }, function(error) {
            console.error(error);
        }, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });
    }
}
</script>

</body>
</html>
